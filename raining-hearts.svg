<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" width="100%" height="100%" style="background-color: #1a0b14; overflow: hidden;">
  <style>
    @keyframes rain {
      0% {
        transform: translateY(-100px) scale(var(--s)) rotate(var(--r1));
        opacity: 0;
      }
      10% { opacity: 1; }
      80% { opacity: 1; }
      100% {
        transform: translateY(1100px) scale(var(--s)) rotate(var(--r2));
        opacity: 0;
      }
    }
    .heart {
      fill: #ff3366;
      animation: rain var(--d) linear infinite;
      animation-delay: var(--dl);
      transform-origin: center;
    }
    .heart-light { fill: #ff6699; }
    .heart-dark { fill: #cc0033; }
  </style>
  <defs>
    <!-- A standard heart vector shape -->
    <path id="heart-shape" d="M 50,30 A 20,20 0,0,1 90,30 A 20,20 0,0,1 130,30 Q 130,60 90,90 Q 50,60 50,30 z" transform="translate(-90, -50)" />
  </defs>

  <!-- Generating multiple hearts with varying custom properties for scale (--s), duration (--d), initial rotation (--r1), final rotation (--r2), and animation delay (--dl) -->
  <use href="#heart-shape" class="heart" x="100" style="--s: 1.2; --d: 4s; --dl: 0s; --r1: -10deg; --r2: 15deg;" />
  <use href="#heart-shape" class="heart heart-light" x="250" style="--s: 0.8; --d: 5s; --dl: -1.5s; --r1: 5deg; --r2: -20deg;" />
  <use href="#heart-shape" class="heart heart-dark" x="400" style="--s: 1.5; --d: 6.5s; --dl: -0.5s; --r1: -15deg; --r2: 30deg;" />
  <use href="#heart-shape" class="heart" x="550" style="--s: 1.0; --d: 4.5s; --dl: -2s; --r1: 0deg; --r2: -10deg;" />
  <use href="#heart-shape" class="heart heart-light" x="700" style="--s: 1.3; --d: 5.2s; --dl: -1s; --r1: 20deg; --r2: 5deg;" />
  <use href="#heart-shape" class="heart heart-dark" x="850" style="--s: 0.9; --d: 3.8s; --dl: -0.2s; --r1: -5deg; --r2: -30deg;" />
  
  <use href="#heart-shape" class="heart heart-light" x="50" style="--s: 0.7; --d: 6s; --dl: -2.5s; --r1: 15deg; --r2: 45deg;" />
  <use href="#heart-shape" class="heart heart-dark" x="180" style="--s: 1.8; --d: 7s; --dl: -3.5s; --r1: -25deg; --r2: 0deg;" />
  <use href="#heart-shape" class="heart" x="320" style="--s: 1.1; --d: 4s; --dl: -3s; --r1: 5deg; --r2: -15deg;" />
  <use href="#heart-shape" class="heart heart-light" x="480" style="--s: 1.4; --d: 4.8s; --dl: -0.8s; --r1: 10deg; --r2: 25deg;" />
  <use href="#heart-shape" class="heart" x="620" style="--s: 0.8; --d: 5.5s; --dl: -1.2s; --r1: -10deg; --r2: -5deg;" />
  <use href="#heart-shape" class="heart heart-dark" x="780" style="--s: 1.2; --d: 4.6s; --dl: -2.2s; --r1: 30deg; --r2: -25deg;" />
  <use href="#heart-shape" class="heart" x="920" style="--s: 1.6; --d: 6.2s; --dl: -0.9s; --r1: 0deg; --r2: -10deg;" />
  
  <!-- Add a little more depth with background fast hearts -->
  <use href="#heart-shape" class="heart heart-dark" x="150" style="--s: 0.4; --d: 3.2s; --dl: -0.7s; --r1: 12deg; --r2: 45deg;" />
  <use href="#heart-shape" class="heart heart-light" x="350" style="--s: 0.5; --d: 3.5s; --dl: -1.8s; --r1: -15deg; --r2: -50deg;" />
  <use href="#heart-shape" class="heart heart-dark" x="650" style="--s: 0.4; --d: 2.9s; --dl: -2.4s; --r1: 5deg; --r2: 20deg;" />
  <use href="#heart-shape" class="heart" x="880" style="--s: 0.5; --d: 3.1s; --dl: -0.3s; --r1: -20deg; --r2: 10deg;" />
</svg>
